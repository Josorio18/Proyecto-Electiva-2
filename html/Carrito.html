<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/Carrito.css">
</head>

<body>
    <header>
        <h1>Carrito de Compras</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="Hombre.html">Hombres</a>
            <a href="Mujer.html">Mujeres</a>
            <a href="Accesorios.html">Accesorios</a>
            <a href="Carrito.html" class="active">Carrito</a>
            <a href="Login.html">Login</a>
        </nav>
    </header>

    <main>
        <h2>Carrito de <span id="userName">Invitado</span></h2>
        <div id="cartItems"></div>
        <div id="cartSummary" class="cart-summary"></div>
    </main>

    <!-- Modal de Pago -->
    <div id="paymentModal" class="payment-modal" style="display: none;">
        <div class="payment-modal-content">
            <span class="close-modal">&times;</span>
            <h2>Detalles de Pago</h2>
            <div class="payment-methods">
                <label>
                    <input type="radio" name="paymentMethod" value="card" checked>
                    💳 Tarjeta de Crédito/Débito
                </label>
                <label>
                    <input type="radio" name="paymentMethod" value="paypal">
                    🅿️ PayPal
                </label>
                <label>
                    <input type="radio" name="paymentMethod" value="cash">
                    💵 Efectivo (Contra Entrega)
                </label>
            </div>

            <form id="paymentForm">
                <div class="card-details" id="cardDetailsBlock">
                    <label for="cardNumber">Número de Tarjeta</label>
                    <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19">

                    <div class="card-row">
                        <div class="card-col">
                            <label for="cardExpiry">Vencimiento</label>
                            <input type="text" id="cardExpiry" placeholder="MM/YY" maxlength="5">
                        </div>
                        <div class="card-col">
                            <label for="cardCvc">CVC</label>
                            <input type="text" id="cardCvc" placeholder="123" maxlength="3">
                        </div>
                    </div>

                    <label for="cardName">Nombre en la tarjeta</label>
                    <input type="text" id="cardName" placeholder="Juan Perez">
                </div>

                <div class="order-summary-box">
                    <p>Subtotal: <span id="modalSubtotal">$0.00</span></p>
                    <p>Envío: <span>Gratis</span></p>
                    <hr>
                    <h3>Total a Pagar: <span id="modalTotal">$0.00</span></h3>
                </div>

                <button type="submit" class="btn-pay-now">Pagar Ahora</button>
            </form>
        </div>
    </div>

    <script src="../JS/app.js"></script>
    <script src="../JS/Carrito.js" defer></script>
    <footer>© 2026 UrbanStyle. Todos los derechos reservados.</footer>
</body>

</html>
