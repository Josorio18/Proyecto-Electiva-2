<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Registro - UrbanStyle</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/Login.css">
    <script>
        if (localStorage.getItem('currentUser')) {
            if (window.history.length > 2) {
                window.history.back();
            } else {
                window.location.replace('index.html');
            }
        }
    </script>
</head>

<body>
    <header>
        <h1>UrbanStyle</h1>
        <nav id="mainNav">
            <a href="index.html">Inicio</a>
            <a href="Hombre.html">Hombres</a>
            <a href="Mujer.html">Mujeres</a>
            <a href="Accesorios.html">Accesorios</a>
            <a href="Carrito.html">Carrito</a>
            <a href="Login.html">Login</a>
            <a href="Registro.html" class="active">Registro</a>
        </nav>
    </header>
    <main class="card">
        <h1>Crear Cuenta</h1>
        <form id="registroForm">
            <label for="name">Nombre</label>
            <input id="name" type="text" required placeholder="Tu nombre">

            <label for="email">Correo electrónico</label>
            <input id="email" type="email" required placeholder="tucorreo@ejemplo.com">
            <div id="emailError" class="error" style="display:none; color:red; margin-bottom:10px;">El correo ya está
                registrado.</div>

            <label for="password">Contraseña</label>
            <input id="password" type="password" required placeholder="Contraseña">

            <div class="form-actions">
                <button type="submit">Registrarse</button>
            </div>
            <p style="text-align:center; margin-top:15px; font-size: 0.9em;">¿Ya tienes cuenta? <a href="Login.html"
                    style="color:var(--primary-color);">Inicia sesión aquí</a></p>
        </form>
    </main>
    <script src="../app.js"></script>
    <script src="../Registro.js"></script>
    <a href="Carrito.html" class="btn-ver-carrito">🛒</a>
    <footer>© 2026 UrbanStyle. Todos los derechos reservados.</footer>
</body>

</html>
