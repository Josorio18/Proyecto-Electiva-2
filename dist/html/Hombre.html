<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sección de Hombres UrbanStyle - Ropa con carácter y estilo urbano premium.">
    <title>UrbanStyle - Hombres</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container">
            <h1>UrbanStyle</h1>
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="Hombre.html" class="active">Hombres</a>
            <a href="Mujer.html">Mujeres</a>
            <a href="Accesorios.html">Accesorios</a>
            <a href="Carrito.html">Carrito</a>
            <a href="Login.html">Login</a>
        </nav>
    </header>

    <main>
        <h2 class="text-center mb-2">Nuestra Colección Masculina</h2>
        <!-- El contenedor se llena dinámicamente desde Hombre.js -->
        <div id="productos-hombres" class="product-grid"></div>
        
        <h2 class="text-center mt-2 mb-2">Productos Destacados</h2>
        <div class="product-grid">
            <article class="product-card">
                <img src="https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcQR98yhYHDIJauIVcrsjpOLQyuNi6zR72mhU9jqYLPFHg9zTk8V-pzQF4XVs5gQkza2MtSvxWw8R5ufsZZab_kKqMxsSA125A" alt="Camisa Casual">
                <h3>Camisa Essential</h3>
                <p class="price">$39.99</p>
                <div class="product-actions">
                    <div class="action-row">
                        <div class="action-item">
                            <label>Talla:</label>
                            <select class="size-select">
                                <option value="S">S</option>
                                <option value="M">M</option>
                                <option value="L">L</option>
                            </select>
                        </div>
                        <div class="action-item">
                            <label>Cant:</label>
                            <input type="number" class="quantity-input" value="1" min="1">
                        </div>
                    </div>
                </div>
                <button class="buy-button">Añadir al carrito</button>
            </article>
        </div>
    </main>

    <a href="Carrito.html" class="btn-ver-carrito">🛒</a>

    <footer>
        <p>© 2026 UrbanStyle. Todos los derechos reservados.</p>
        <p style="font-size: 0.7rem; opacity: 0.5; margin-top: 10px;">Diseño Premium Minimalista</p>
    </footer>

    <script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/Carrito.js"></script>
    <script type="module" src="../js/Hombre.js"></script>

</body>
</html>
