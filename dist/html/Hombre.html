<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sección Hombres</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/Decoracion.css">
</head>
<body>
    <header>
        <h1>Ropa para Hombres</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="Hombre.html" class="active">Hombres</a>
            <a href="Mujer.html">Mujeres</a>
            <a href="Accesorios.html">Accesorios</a>
            <a href="Carrito.html">Carrito</a>
            <a href="Login.html">Login</a>
        </nav>
    </header>

    <main class="products">
        <!-- Contenedor dinámico para productos renderizados por hombres.js -->
        <div id="productos-hombres"></div>
        
        <!-- Algunos productos de ejemplo para la sección hombres -->
        <article class="product-card">
            <img src="https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcQR98yhYHDIJauIVcrsjpOLQyuNi6zR72mhU9jqYLPFHg9zTk8V-pzQF4XVs5gQkza2MtSvxWw8R5ufsZZab_kKqMxsSA125A" alt="Camisa Casual">
            <h2>Camisa Casual</h2>
            <p class="price">$39.99</p>
            <label for="msize1">Talla:</label>
            <select id="msize1" class="size-select">
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
            </select>
            <label for="mqty1">Cantidad:</label>
            <input type="number" id="mqty1" class="quantity-input" min="1" value="1" style="width: 50px; margin-bottom: 10px;">
            <button class="buy-button">Añadir al carrito</button>
        </article>
        <article class="product-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSplZ28NDXmNErsgnn_H9qAQ-41jJ4X4bQotw&s" alt="Pantalón de Jeans">
            <h2>Pantalón de Jeans</h2>
            <p class="price">$49.99</p>
            <label for="msize2">Talla:</label>
            <select id="msize2" class="size-select">
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
            </select>
            <label for="mqty2">Cantidad:</label>
            <input type="number" id="mqty2" class="quantity-input" min="1" value="1" style="width: 50px; margin-bottom: 10px;">
            <button class="buy-button">Añadir al carrito</button>
        </article>
        <article class="product-card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTkPkRf_4qkEtUcloGT4ku2NKH3g3R49Zqezg&s" alt="Chaqueta Urbano">
            <h2>Chaqueta Urbano</h2>
            <p class="price">$69.99</p>
            <label for="msize3">Talla:</label>
            <select id="msize3" class="size-select">
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
            </select>
            <label for="mqty3">Cantidad:</label>
            <input type="number" id="mqty3" class="quantity-input" min="1" value="1" style="width: 50px; margin-bottom: 10px;">
            <button class="buy-button">Añadir al carrito</button>
        </article>
    </main>

    <script src="../app.js"></script>
    <script src="../Carrito.js" defer></script>
    <script src="../hombres.js" defer></script>
    <a href="Carrito.html" class="btn-ver-carrito">🛒</a>
    <footer>© 2026 UrbanStyle. Todos los derechos reservados.</footer>

</html>
