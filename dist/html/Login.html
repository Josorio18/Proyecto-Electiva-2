<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Iniciar sesión</title>

	<link rel="stylesheet" href="../CSS/style.css">
	<link rel="stylesheet" href="../CSS/Login.css">
	<script>
		if (localStorage.getItem('currentUser')) {
			if (window.history.length > 2) {
				window.history.back();
			} else {
				window.location.replace('index.html');
			}
		}
	</script>
</head>

<body>
	<header>
		<h1>UrbanStyle</h1>
	</header>
	<main class="card">
		<h1>Iniciar sesión</h1>


		<form id="loginForm">
			<label for="email">Correo electrónico</label>
			<input id="email" type="email" required placeholder="tucorreo@ejemplo.com">
			<div id="emailError" class="error">Introduce un correo válido.</div>

			<label for="password">Contraseña</label>
			<input id="password" type="password" required placeholder="Contraseña">
			<div id="passError" class="error">Introduce la contraseña.</div>

			<div class="row">
				<label><input id="remember" type="checkbox"> Recuérdame</label>
			</div>

			<div class="form-actions">
				<button type="submit">Entrar</button>
			</div>
			<p style="text-align:center; margin-top:15px; font-size: 0.9em;">¿No tienes cuenta? <a href="Registro.html"
					style="color:var(--primary-color);">Regístrate aquí</a></p>
		</form>
	</main>
	<script type="module" src="../js/app.js"></script>
    <script type="module" src="../js/Login.js" defer></script>
	<a href="Carrito.html" class="btn-ver-carrito">🛒</a>
	<footer>© 2026 UrbanStyle. Todos los derechos reservados.</footer>
</body>

</html>
